<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EntryHub QR Access</title>
 
</head>
<body>
  <div class="container">
    
   <h1 class="brand">IdexQR<sup>®</sup></h1>

   <link rel="stylesheet" href="idexqr.css">
<p class="sub"><em>Use the options below to begin your experience</em></p>

<p class="ticket-intro"><em>Need your ticket later?</em></p>
<a href="index.html" class="ticket-button">View your ticket</a>

<div class="qr-section">
  <h3>Explore</h3>
  <p class="qr-place">Radius Museum</p>
  <a href="YOUR-DISCOVER-LINK" class="qr-link">
    <img src="images/discover-qr.png" alt="QR Discover code" class="qr-code" />
    <div class="qr-label">Tap or scan</div>
  </a>
</div>

<div class="qr-section">
  <h3>Listen</h3>
  <p class="qr-place">Willow Cottage</p>
  <a href="YOUR-LISTEN-LINK" class="qr-link">
    <img src="images/listen-qr.png" alt="QR Listen code" class="qr-code" />
    <div class="qr-label">Tap or scan</div>
  </a>
</div>
   
</body>
</html>
