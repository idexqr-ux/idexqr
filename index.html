<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EntryHub QR Access</title>
 
</head>
<body>
  <div class="container">
    
   <h1 class="brand">IdexQR<sup>®</sup></h1>

   <link rel="stylesheet" href="idexqr.css">
<p class="sub"><em>Use the options below to begin your experience</em></p>

<div class="qr-section">
  <a href="https://qr-entryhub.com/guide.html" class="qr-link">
    <img src="images/ticket.png" alt="Open your ticket" class="qr-code" />
    <p class="qr-label">Tap to open</p>
  </a>
</div>

<div class="qr-section">
  <h3>Explore</h3>
  <p class="qr-place">Radius Museum</p>
  <a href="https://qr-discover.com" class="qr-link">
    <img src="images/discover-qr.png" alt="Explore QR" class="qr-code" />
    <div class="qr-label">Tap or scan</div>
  </a>
</div>

<div class="qr-section">
  <h3>Listen</h3>
  <p class="qr-place">Willow Cottage</p>
  <a href="https://qr-listen.com" class="qr-link">
    <img src="images/listen-qr.png" alt="Listen QR" class="qr-code" />
    <div class="qr-label">Tap or scan</div>
  </a>
</div>
   
</body>
</html>
