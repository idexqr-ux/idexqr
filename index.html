<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>IdexQR</title>
  <meta name="description" content="Calm, connected experiences." />

  <style>
    :root {
      --ink: #2f3a38;
      --muted: #6b7a77;
    }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(
        to bottom,
        #fbfcfb 0%,
        #eef3f1 60%,
        #dde8e3 100%
      );
      color: var(--ink);
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .wrap {
      max-width: 720px;
      padding: 48px 24px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.4rem;
      font-weight: normal;
    }

    .reg {
      font-size: 0.42em;
      vertical-align: 0.5em;
      opacity: 0.85;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .links a {
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid #c9d5d0;
  color: var(--ink);
  font-size: 0.95rem;
  display: inline-block;
  background: #eef3f1;
}

    footer {
      margin-top: 10px;
    }

    .footer-line {
      display: block;
      width: 40px;
      height: 1px;
      background: #c9d5d0;
      margin: 0 auto;
      opacity: 0.6;
    }

    footer {
  margin-top: 40px;
}

.footer-inner {
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
}

.footer-line-text {
  margin: 0;
  font-size: 0.9rem;
  letter-spacing: 0.3px;
}

.footer-sub {
  margin: 4px 0 0;
  font-size: 0.8rem;
  opacity: 0.85;
}

    footer {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid #dfe7e3;
}

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <p class="sr-only">
      You have opened the IdexQR website.
      This page provides access to simple, calm, connected experiences.
      You can choose to discover information, listen to guidance, or open your entry hub.
    </p>

    <h1>IdexQR<span class="reg">®</span></h1>
    <p class="tagline">Calm, connected experiences.</p>

    <nav aria-label="Available experiences">
      <div class="links">
        <a href="https://qr-discover.com" class="discover" aria-label="Discover information and explore experiences">Discover</a>
        <a href="https://qr-entryhub.com" class="entry" aria-label="Open your entry hub and access your ticket">EntryHub</a>
        <a href="https://qr-listen.com" class="listen" aria-label="Listen to spoken guidance and instructions">Listen</a>
      </div>
    </nav>

    <footer>
  <div class="footer-inner">
    <p class="footer-line-text">IdexQR</p>
    <p class="footer-sub">Calm, connected experiences</p>
  </div>
</footer>
  </main>
</body>
</html>
