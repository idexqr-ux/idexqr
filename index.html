<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>IdexQR</title>
  <meta name="description" content="Calm, connected experiences." />

  <style>
    :root {
      --celadon: #c9d5d0;
      --celadon-deep: #b8c6c1;
      --ink: #2f3a38;
      --muted: #6b7a77;
      --bg: #f7f9f8;
    }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(
  to bottom,
  #fbfcfb 0%,
  #eef3f1 60%,
  #dde8e3 100%
);
      color: var(--ink);
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .wrap {
      max-width: 720px;
      padding: 48px 24px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.4rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .links a {
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--celadon-deep);
      background: rgba(255,255,255,0.85);
      color: var(--ink);
      font-size: 0.95rem;
    }

    /* Discover */
.discover {
  background: #e4eeea;
  border-color: #c9d5d0;
}

/* EntryHub */
.entry {
  background: #f1e9dc;
  border-color: #e2d2b8;
}

/* Listen */
.listen {
  background: #e6ebef;
  border-color: #c8d2d8;
}

    footer {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Screen reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>

<body>

  <main class="wrap">

    <!-- Screen reader introduction -->
    <p class="sr-only">
      You have opened the IdexQR website.
      This page provides access to simple, calm, connected experiences.
      You can choose to discover information, listen to guidance, or open your event entry hub.
    </p>

    <h1>IdexQR®</h1>
    <p class="tagline">Calm, connected experiences.</p>

    <nav aria-label="Available experiences">
      <div class="links">
        <a href="https://qr-discover.com" class="discover" aria-label="Discover information and explore experiences">Discover</a>

<a href="https://qr-entryhub.com" class="entry" aria-label="Open your event entry hub and access your ticket">EntryHub</a>

<a href="https://qr-listen.com" class="listen" aria-label="Listen to spoken guidance and instructions">Listen</a>
          Listen
        </a>
      </div>
    </nav>

    <footer>
      IdexQR®
    </footer>

  </main>

</body>
</html>
