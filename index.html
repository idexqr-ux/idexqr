<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EntryHub QR Access</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f8f6f2;
      color: #2c2c2c;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    .museum-logo,
    .listen-image {
      display: block;
      max-width: 140px;
      width: 100%;
      height: auto;
      margin: 1.1rem auto 1.2rem;
      opacity: 0.9;
    }

    h1 {
      font-size: 1.8rem;
      margin: 0.4rem 0 0.4rem;
    }

    .brand sup {
  font-size: 0.55em;
  vertical-align: super;
  margin-left: 2px;
  opacity: 0.7;
}

    .subheading {
      font-style: italic;
      font-size: 1rem;
      opacity: 0.85;
      margin-bottom: 1.5rem;
    }

    .ticket-button {
  display: inline-block;
  margin: 0.5rem auto 1.5rem;
  padding: 0.85rem 1.4rem;
  background: #2c2c2c;
  color: #fff;
  text-decoration: none;
  border-radius: 999px;
  font-size: 1rem;
  font-weight: 500;
}

.ticket-button:hover {
  opacity: 0.9;
}

 .ticket-intro {
  margin: 0.5rem 0 0.6rem;
  font-size: 0.95rem;
  opacity: 0.8;
}

    .divider {
      width: 70%;
      height: 1px;
      background: #b8b1a6;
      margin: 1.2rem auto 1.8rem;
    }

    .qr-section {
      margin-bottom: 2rem;
      text-align: center;
    }

    .qr-title {
      font-size: 1.15rem;
      margin-bottom: 0.4rem;
    }

    .qr-desc {
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      opacity: 0.85;
    }

    .qr-link {
      display: inline-block;
      text-decoration: none;
      color: inherit;
    }

    .qr-code {
  display: block;
  width: 65%;          /* scales with screen */
  max-width: 240px;    /* larger cap */
  min-width: 180px;    /* never too small */
  margin: 1rem auto 0.4rem;
  padding: 10px;
  background: #fff;
  border: 2.5px solid #2e5a3f;
  border-radius: 14px;
}

    .qr-label {
      text-align: center;
      font-style: italic;
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 1.2rem;
    }

    .qr-place {
  font-size: 0.85rem;
  opacity: 0.75;
  margin-bottom: 0.6rem;
}

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      text-decoration: none;
      color: #2c2c2c;
      font-size: 0.95rem;
      border-bottom: 1px solid #2c2c2c;
      padding-bottom: 2px;
    }

    .back-link:hover,
    .qr-link:hover .qr-label {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    
   <h1 class="brand">IdexQR<sup>®</sup></h1>

<p class="sub"><em>Use the options below to begin your experience</em></p>

<p class="ticket-intro"><em>Need your ticket later?</em></p>
<a href="index.html" class="ticket-button">View your ticket</a>

<div class="qr-section">
  <h3>QR Discover</h3>
  <p class="qr-desc">Explore more about your visit</p>
  <a href="YOUR-DISCOVER-LINK" class="qr-link">
    <img src="images/discover-qr.png" alt="QR Discover code" class="qr-code" />
    <div class="qr-label">Tap or scan</div>
  </a>
</div>

<div class="qr-section">
  <h3>QR Listen</h3>
  <p class="qr-desc">Start the audio experience</p>
  <a href="YOUR-LISTEN-LINK" class="qr-link">
    <img src="images/listen-qr.png" alt="QR Listen code" class="qr-code" />
    <div class="qr-label">Tap or scan</div>
  </a>
</div>
   
</body>
</html>
