<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EntryHub QR Access</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f8f6f2;
      color: #2c2c2c;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    .museum-logo,
    .listen-image {
      display: block;
      max-width: 140px;
      width: 100%;
      height: auto;
      margin: 1.1rem auto 1.2rem;
      opacity: 0.9;
    }

    h1 {
      font-size: 1.8rem;
      margin: 0.4rem 0 0.4rem;
    }

    .subheading {
      font-style: italic;
      font-size: 1rem;
      opacity: 0.85;
      margin-bottom: 1.5rem;
    }

    .divider {
      width: 70%;
      height: 1px;
      background: #b8b1a6;
      margin: 1.2rem auto 1.8rem;
    }

    .qr-section {
      margin-bottom: 2rem;
      text-align: center;
    }

    .qr-title {
      font-size: 1.15rem;
      margin-bottom: 0.4rem;
    }

    .qr-desc {
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      opacity: 0.85;
    }

    .qr-link {
      display: inline-block;
      text-decoration: none;
      color: inherit;
    }

    .qr-code {
      display: block;
      max-width: 140px;
      width: 100%;
      height: auto;
      margin: 1.1rem auto 0.4rem;
      opacity: 1;
      background: #fff;
      padding: 6px;
      border: 2.5px solid #000;
      box-sizing: border-box;
    }

    .qr-label {
      text-align: center;
      font-style: italic;
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 1.2rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      text-decoration: none;
      color: #2c2c2c;
      font-size: 0.95rem;
      border-bottom: 1px solid #2c2c2c;
      padding-bottom: 2px;
    }

    .back-link:hover,
    .qr-link:hover .qr-label {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <h1>EntryHub</h1>
    <div class="subheading">Know before you go</div>

    <div class="divider"></div>

    <div class="qr-section">
      <div class="qr-title">QR Discover</div>
      <div class="qr-desc">Explore more about your visit</div>
      <a href="https://your-discover-link-here.com" class="qr-link">
        <img src="images/qr-discover.png" alt="QR Discover code" class="qr-code" />
        <div class="qr-label">Tap or scan</div>
      </a>
    </div>

    <div class="qr-section">
      <div class="qr-title">QR Listen</div>
      <div class="qr-desc">Start the audio experience</div>
      <a href="https://your-listen-link-here.com" class="qr-link">
        <img src="images/qr-listen.png" alt="QR Listen code" class="qr-code" />
        <div class="qr-label">Tap or scan</div>
      </a>
    </div>

    <a href="index.html" class="back-link">Back to EntryHub</a>
  </div>
</body>
</html>
