<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IdexQR</title>
  <meta name="description" content="Calm, connected experiences. More coming soon." />
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f7f9f8;
      color: #2f3a38;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap {
      max-width: 720px;
      padding: 40px 24px;
      text-align: center;
    }
    h1 {
      margin-bottom: 12px;
      font-size: 2.2rem;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      padding: 10px 16px;
      border: 1px solid #b8c6c1;
      border-radius: 999px;
      color: #2f3a38;
      background: white;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>IdexQR®</h1>
    <p>Calm, connected experiences. More coming soon.</p>

    <div class="links">
      <a href="https://qr-discover.com">Discover</a>
      <a href="https://qr-entryhub.com">EntryHub</a>
      <a href="https://qr-listen.com">Listen</a>
    </div>
  </main>
</body>
</html>
