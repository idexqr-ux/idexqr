<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>IdexQR</title>
  <meta name="description" content="Calm, connected experiences." />

  <style>
    :root {
      --ink: #2f3a38;
      --muted: #6b7a77;
    }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(
        to bottom,
        #fbfcfb 0%,
        #eef3f1 60%,
        #dde8e3 100%
      );
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .wrap {
      width: min(720px, 100%);
      padding: 72px 28px 56px;
      text-align: center;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 2.35rem;
      font-weight: normal;
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .tagline {
      margin: 0 0 44px;
      font-size: 1.08rem;
      line-height: 1.6;
      color: var(--muted);
    }

    nav {
      margin: 0 0 56px;
    }

    .links {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 999px;
      border: 1px solid #cfd8d4;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font-size: 0.96rem;
      line-height: 1.2;
      display: inline-block;
      min-width: 96px;
    }

    footer {
      padding-top: 24px;
    }

    .footer-line {
      width: 52px;
      height: 1px;
      background: #cad5d0;
      margin: 0 auto 18px;
      opacity: 0.8;
    }

    .footer-text {
      margin: 0;
      font-size: 0.92rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 64px 22px 48px;
      }

      h1 {
        font-size: 2.05rem;
        margin-bottom: 16px;
      }

      .tagline {
        margin-bottom: 38px;
        font-size: 1rem;
      }

      nav {
        margin-bottom: 48px;
      }

      .links {
        gap: 10px;
      }

      .links a {
        min-width: 88px;
        padding: 11px 18px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <p class="sr-only">
      You have opened the IdexQR website.
      This page provides access to simple, calm, connected experiences.
      You can choose to discover information, listen to guidance, or open your entry hub.
    </p>

    <h1>IdexQR</h1>
    <p class="tagline">Calm, connected experiences.</p>

    <nav aria-label="Available experiences">
      <div class="links">
        <a href="https://qr-discover.com" aria-label="Discover information and explore experiences">Discover</a>
        <a href="https://qr-entryhub.com" aria-label="Open your entry hub and access your ticket">EntryHub</a>
        <a href="https://qr-listen.com" aria-label="Listen to spoken guidance and instructions">Listen</a>
      </div>
    </nav>

    <footer>
      <div class="footer-line"></div>
      <p class="footer-text">IdexQR</p>
    </footer>
  </main>
</body>
</html>
