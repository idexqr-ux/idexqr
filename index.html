<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>IdexQR</title>
  <meta name="description" content="Calm, connected experiences." />

  <style>
    :root {
      --celadon: #c9d5d0;
      --celadon-deep: #b8c6c1;
      --ink: #2f3a38;
      --muted: #6b7a77;
      --bg: #f7f9f8;
    }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(to bottom, var(--bg), var(--celadon));
      color: var(--ink);
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .wrap {
      max-width: 720px;
      padding: 48px 24px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.4rem;
      letter-spacing: 0.5px;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .links a {
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--celadon-deep);
      background: rgba(255,255,255,0.85);
      color: var(--ink);
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .links a:hover {
      background: white;
      border-color: var(--ink);
    }

    footer {
      font-size: 0.85rem;
      color: var(--muted);
      opacity: 0.9;
    }

    footer span {
      display: block;
      margin-top: 6px;
      font-size: 0.8rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>IdexQR®</h1>
    <p class="tagline">Calm, connected experiences.</p>

    <div class="links">
      <a href="https://qr-discover.com">Discover</a>
      <a href="https://qr-entryhub.com">EntryHub</a>
      <a href="https://qr-listen.com">Listen</a>
    </div>

    <footer>
      IdexQR®
      <span>Because clearer information creates calmer experiences</span>
    </footer>
  </main>
</body>
</html>
